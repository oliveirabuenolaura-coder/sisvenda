<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doce Magia | Candy Shop</title>
    <style>
        /* Configurações Gerais */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #fff5f8;
            color: #5d4037;
        }

        /* Cabeçalho */
        header {
            background-color: #ffc1e3;
            padding: 2rem;
            text-align: center;
            border-bottom: 5px solid #ff80ab;
        }

        header h1 {
            font-size: 3rem;
            color: #ad1457;
            text-shadow: 2px 2px #fff;
        }

        /* Vitrine de Produtos */
        .container {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .grid-doces {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
        }

        /* Cartão de Produto */
        .card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
            text-align: center;
            border: 2px solid #fce4ec;
        }

        .card:hover {
            transform: translateY(-10px);
        }

        .card-img {
            width: 100%;
            height: 200px;
            background-color: #f8bbd0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
        }

        .card-info {
            padding: 1.5rem;
        }

        .card-info h3 {
            margin-bottom: 0.5rem;
            color: #880e4f;
        }

        .preco {
            font-weight: bold;
            color: #ff4081;
            font-size: 1.2rem;
            display: block;
            margin-bottom: 1rem;
        }

        .btn-comprar {
            background-color: #ff80ab;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: background 0.3s;
        }

        .btn-comprar:hover {
            background-color: #f50057;
        }

        /* Rodapé */
        footer {
            text-align: center;
            padding: 2rem;
            background: #fce4ec;
            margin-top: 3rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>🍭 Doce Magia</h1>
        <p>Onde o mundo fica mais doce!</p>
    </header>

    <div class="container">
        <div class="grid-doces">
            
            <div class="card">
                <div class="card-img">🧁</div>
                <div class="card-info">
                    <h3>Cupcake Velvet</h3>
                    <span class="preco">R$ 12,00</span>
                    <button class="btn-comprar">Adicionar</button>
                </div>
            </div>

            <div class="card">
                <div class="card-img">🍩</div>
                <div class="card-info">
                    <h3>Donut Glaceado</h3>
                    <span class="preco">R$ 8,50</span>
                    <button class="btn-comprar">Adicionar</button>
                </div>
            </div>

            <div class="card">
                <div class="card-img">🍦</div>
                <div class="card-info">
                    <h3>Sorvete Especial</h3>
                    <span class="preco">R$ 15,00</span>
                    <button class="btn-comprar">Adicionar</button>
                </div>
            </div>

            <div class="card">
                <div class="card-img">🍫</div>
                <div class="card-info">
                    <h3>Trufa Artesanal</h3>
                    <span class="preco">R$ 5,00</span>
                    <button class="btn-comprar">Adicionar</button>
                </div>
            </div>

        </div>
    </div>

    <footer>
        <p>&copy; 2024 Doce Magia Shop - Feito com ❤️ e açúcar.</p>
    </footer>

</body>
</html>
